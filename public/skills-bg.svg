<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0f1d30"/>
      <stop offset="100%" stop-color="#030912"/>
    </radialGradient>
    <radialGradient id="cg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4a265" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c4a265" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="60" cy="90" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="140" cy="55" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="200" cy="130" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="320" cy="70" r="0.5" fill="white" opacity="0.3"/>
  <circle cx="480" cy="85" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="600" cy="60" r="0.6" fill="white" opacity="0.4"/>
  <circle cx="700" cy="120" r="0.5" fill="white" opacity="0.5"/>
  <circle cx="740" cy="200" r="0.7" fill="white" opacity="0.3"/>
  <circle cx="720" cy="300" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="760" cy="450" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="740" cy="600" r="0.5" fill="white" opacity="0.3"/>
  <circle cx="680" cy="700" r="0.7" fill="white" opacity="0.4"/>
  <circle cx="550" cy="740" r="0.5" fill="white" opacity="0.5"/>
  <circle cx="350" cy="760" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="180" cy="720" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="80" cy="650" r="0.7" fill="white" opacity="0.5"/>
  <circle cx="50" cy="500" r="0.5" fill="white" opacity="0.3"/>
  <circle cx="75" cy="350" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="90" cy="220" r="0.5" fill="white" opacity="0.5"/>
  <circle cx="640" cy="380" r="0.6" fill="white" opacity="0.3"/>
  <circle cx="160" cy="440" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="520" cy="660" r="0.7" fill="white" opacity="0.5"/>
  <circle cx="280" cy="680" r="0.5" fill="white" opacity="0.3"/>

  <!-- Grid circles -->
  <circle cx="400" cy="400" r="80"  fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.4" stroke-dasharray="4,6"/>
  <circle cx="400" cy="400" r="155" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.3" stroke-dasharray="4,8"/>
  <circle cx="400" cy="400" r="230" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.25" stroke-dasharray="4,10"/>

  <!-- Cross lines -->
  <line x1="400" y1="50" x2="400" y2="750" stroke="#1a3050" stroke-width="0.5" opacity="0.3" stroke-dasharray="5,10"/>
  <line x1="50" y1="400" x2="750" y2="400" stroke="#1a3050" stroke-width="0.5" opacity="0.3" stroke-dasharray="5,10"/>
  <line x1="157" y1="157" x2="643" y2="643" stroke="#1a3050" stroke-width="0.4" opacity="0.2" stroke-dasharray="4,12"/>
  <line x1="643" y1="157" x2="157" y2="643" stroke="#1a3050" stroke-width="0.4" opacity="0.2" stroke-dasharray="4,12"/>

  <!-- Constellation edges -->
  <line x1="400" y1="170" x2="563" y2="237" stroke="#4a7ab5" stroke-width="1"   opacity="0.5"/>
  <line x1="563" y1="237" x2="630" y2="400" stroke="#4a7ab5" stroke-width="1"   opacity="0.5"/>
  <line x1="630" y1="400" x2="563" y2="563" stroke="#4a7ab5" stroke-width="1"   opacity="0.5"/>
  <line x1="563" y1="563" x2="400" y2="630" stroke="#4a7ab5" stroke-width="1"   opacity="0.5"/>
  <line x1="400" y1="630" x2="237" y2="563" stroke="#4a7ab5" stroke-width="1"   opacity="0.5"/>
  <line x1="237" y1="563" x2="170" y2="400" stroke="#4a7ab5" stroke-width="1"   opacity="0.5"/>
  <line x1="170" y1="400" x2="237" y2="237" stroke="#4a7ab5" stroke-width="1"   opacity="0.5"/>
  <line x1="237" y1="237" x2="400" y2="170" stroke="#4a7ab5" stroke-width="1"   opacity="0.5"/>

  <!-- Center glow + dot -->
  <circle cx="400" cy="400" r="40" fill="url(#cg)"/>
  <circle cx="400" cy="400" r="7"  fill="#c4a265" opacity="0.9" filter="url(#glow)"/>
  <circle cx="400" cy="400" r="14" fill="none" stroke="#c4a265" stroke-width="0.7" opacity="0.4"/>

  <!-- Skill nodes (outer ring r=230) -->
  <!-- React top -->
  <circle cx="400" cy="170" r="11" fill="#61dafb" opacity="0.85" filter="url(#glow)"/>
  <text x="400" y="148" text-anchor="middle" fill="#8ecce0" font-family="Georgia,serif" font-size="12" letter-spacing="1">React</text>

  <!-- TypeScript -->
  <circle cx="563" cy="237" r="11" fill="#3178c6" opacity="0.9" filter="url(#glow)"/>
  <text x="586" y="230" fill="#7aaad8" font-family="Georgia,serif" font-size="12" letter-spacing="1">TypeScript</text>

  <!-- Next.js -->
  <circle cx="630" cy="400" r="11" fill="#e8e8e8" opacity="0.8" filter="url(#glow)"/>
  <text x="650" y="404" fill="#b0b8c4" font-family="Georgia,serif" font-size="12" letter-spacing="1">Next.js</text>

  <!-- Three.js -->
  <circle cx="563" cy="563" r="11" fill="#ffffff" opacity="0.7" filter="url(#glow)"/>
  <text x="584" y="576" fill="#a0b0c0" font-family="Georgia,serif" font-size="12" letter-spacing="1">Three.js</text>

  <!-- Node.js -->
  <circle cx="400" cy="630" r="11" fill="#68a063" opacity="0.85" filter="url(#glow)"/>
  <text x="400" y="656" text-anchor="middle" fill="#8ab88a" font-family="Georgia,serif" font-size="12" letter-spacing="1">Node.js</text>

  <!-- PHP -->
  <circle cx="237" cy="563" r="11" fill="#8892bf" opacity="0.85" filter="url(#glow)"/>
  <text x="148" y="576" fill="#9090c0" font-family="Georgia,serif" font-size="12" letter-spacing="1">PHP</text>

  <!-- MySQL -->
  <circle cx="170" cy="400" r="11" fill="#f29111" opacity="0.85" filter="url(#glow)"/>
  <text x="80" y="404" fill="#c0a060" font-family="Georgia,serif" font-size="12" letter-spacing="1">MySQL</text>

  <!-- Supabase -->
  <circle cx="237" cy="237" r="11" fill="#3ecf8e" opacity="0.85" filter="url(#glow)"/>
  <text x="148" y="230" fill="#60b890" font-family="Georgia,serif" font-size="12" letter-spacing="1">Supabase</text>

  <!-- Inner ring: React Native, GSAP, Zustand (r=155) at 60°,180°,300° -->
  <circle cx="534" cy="323" r="6" fill="#61dafb" opacity="0.5"/>
  <text x="548" y="320" fill="#4a7890" font-family="Georgia,serif" font-size="9" letter-spacing="0.5">React Native</text>

  <circle cx="400" cy="555" r="6" fill="#88ce02" opacity="0.5"/>
  <text x="413" y="553" fill="#5a7020" font-family="Georgia,serif" font-size="9" letter-spacing="0.5">GSAP</text>

  <circle cx="266" cy="323" r="6" fill="#a855f7" opacity="0.5"/>
  <text x="196" y="320" fill="#7050a0" font-family="Georgia,serif" font-size="9" letter-spacing="0.5">Zustand</text>

  <!-- Title -->
  <text x="400" y="46" text-anchor="middle" fill="#c4a265" font-family="Georgia,serif" font-size="20" letter-spacing="5" opacity="0.9">SKILLS &amp; TOOLS</text>

  <!-- Bottom label -->
  <text x="400" y="772" text-anchor="middle" fill="#c4a265" font-family="Georgia,serif" font-size="11" letter-spacing="3" opacity="0.5">Dimas Rahmanda · 2025</text>

  <!-- Border frames -->
  <rect x="8"  y="8"  width="784" height="784" fill="none" stroke="#c4a265" stroke-width="1.5" opacity="0.6"/>
  <rect x="18" y="18" width="764" height="764" fill="none" stroke="#c4a265" stroke-width="0.5" opacity="0.3"/>

  <!-- Corner marks -->
  <path d="M8,40 L8,8 L40,8"    fill="none" stroke="#c4a265" stroke-width="2.5" opacity="0.8"/>
  <path d="M760,8 L792,8 L792,40" fill="none" stroke="#c4a265" stroke-width="2.5" opacity="0.8"/>
  <path d="M8,760 L8,792 L40,792"  fill="none" stroke="#c4a265" stroke-width="2.5" opacity="0.8"/>
  <path d="M760,792 L792,792 L792,760" fill="none" stroke="#c4a265" stroke-width="2.5" opacity="0.8"/>
</svg>
